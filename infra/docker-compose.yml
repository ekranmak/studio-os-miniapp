version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minipp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../apps/api/.env
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../apps/web/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
